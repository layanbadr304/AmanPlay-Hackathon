<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AmanPlay - Detection</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #222; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        /* Phone */
        .phone-container { 
            width: 375px; 
            height: 750px; 
            background-color: #fff; 
            border-radius: 40px; 
            position: relative; 
            box-shadow: 0 0 0 10px #333, 0 20px 50px rgba(0,0,0,0.5); 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }
        
        
        .circle-bg { 
            position: absolute; 
            width: 450px; 
            height: 450px; 
            background-color: #d1ebe5; 
            border-radius: 50%; 
            top: -150px; 
            right: -80px; 
            z-index: 1; 
        }

        .content { 
            position: relative; 
            z-index: 5; 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
            padding: 60px 20px 20px; 
            gap: 20px; 
        }
        
        h1 { color: #26C6B0; font-size: 28px; margin-bottom: 5px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 20px; }

        
        .card { 
            width: 100%; 
            background-color: #f1f8f7; 
            padding: 25px; 
            border-radius: 25px; 
            text-align: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #e1eeeb;
        }

        h3 { color: #444; margin-bottom: 15px; font-size: 18px; font-weight: bold; }

        /* Record buttoun*/
        .record-btn { 
            width: 80px; 
            height: 80px; 
            border-radius: 50%; 
            border: 4px solid #26C6B0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin: 0 auto; 
            background: white; 
            cursor: pointer; 
            transition: all 0.3s ease;
            font-size: 30px;
            outline: none;
        }
        
        .record-btn.recording {
            background-color: #ff4757;
            border-color: #ff4757;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(255, 71, 87, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); }
        }

        /* Text input*/
        .text-input { 
            width: 100%; 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid #ccc; 
            outline: none; 
            margin-bottom: 10px; 
            text-align: center; 
            font-size: 16px; 
        }

        .submit-btn { 
            background-color: #26C6B0; 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 12px; 
            cursor: pointer; 
            width: 100%; 
            font-weight: bold; 
            font-size: 16px; 
            transition: 0.3s; 
        }

        .submit-btn:hover { background-color: #1f9e8d; }

        .back-link { 
            position: absolute; 
            top: 45px; 
            right: 25px; 
            z-index: 10; 
            color: #6C7E7B; 
            text-decoration: none; 
            font-weight: bold; 
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <div class="circle-bg"></div>

        <a href="{{ url_for('index') }}" class="back-link">← عودة</a>
        
        <div class="content">
            <h1>نظام الكشف</h1>
            <p class="subtitle">حلول ذكية لمجتمع ألعاب آمن</p>

            <input type="hidden" id="main_virtual_key" value="sk-c-Mjq0yoJ0YXmGVNq-KeOA">

            <div class="card">
                <h3>تسجيل صوتي مباشر</h3>
                <button type="button" id="recordBtn" class="record-btn">🎙️</button>
                <div id="record-status" style="margin-top:15px; font-size:14px; color:#666;">اضغطي للبدء بالتسجيل</div>
                
                <form action="{{ url_for('analyze') }}" method="post" enctype="multipart/form-data" id="audioForm" style="display:none;">
                    <input type="hidden" name="virtual_key" id="hidden_audio_key">
                    <input type="file" name="audio_file" id="blob_file">
                </form>
            </div>

            <div class="card">
                <h3>كشف كتابي</h3>
                <form action="{{ url_for('analyze') }}" method="post" id="textForm">
                    <input type="hidden" name="virtual_key" id="hidden_text_key">
                    <input type="text" name="text_input" class="text-input" placeholder="اكتب الرسالة هنا..." required>
                    <button type="button" onclick="submitTextForm()" class="submit-btn">بدأ الفحص</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        let mediaRecorder;
        let audioChunks = [];
        const recordBtn = document.getElementById('recordBtn');
        const statusText = document.getElementById('record-status');

        // وظيفة التحكم بالتسجيل
        recordBtn.onclick = async () => {
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = (event) => {
                        audioChunks.push(event.data);
                    };

                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                        statusText.innerText = "جاري المعالجة...";
                        
                        // تجهيز الملف للإرسال
                        const file = new File([audioBlob], "recording.wav", { type: "audio/wav" });
                        const container = new DataTransfer();
                        container.items.add(file);
                        document.getElementById('blob_file').files = container.files;

                        // تعبئة المفتاح وإرسال الفورم
                        document.getElementById('hidden_audio_key').value = document.getElementById('main_virtual_key').value;
                        document.getElementById('audioForm').submit();
                    };

                    mediaRecorder.start();
                    statusText.innerText = "جاري التسجيل... اضغطي للإيقاف";
                    recordBtn.classList.add('recording');
                    recordBtn.innerText = "⏹️";
                } catch (err) {
                    alert("يرجى السماح بالوصول للميكروفون.");
                }
            } else {
                mediaRecorder.stop();
                recordBtn.classList.remove('recording');
                recordBtn.innerText = "🎙️";
            }
        };

        // وظيفة إرسال النص
        function submitTextForm() {
            const key = document.getElementById('main_virtual_key').value;
            const textInput = document.querySelector('input[name="text_input"]').value;
            
            if (textInput.trim() !== "") {
                document.getElementById('hidden_text_key').value = key;
                document.getElementById('textForm').submit();
            } else {
                alert("يرجى كتابة نص أولاً");
            }
        }
    </script>
</body>
</html>
