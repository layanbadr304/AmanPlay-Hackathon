<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AmanPlay - App View</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #222; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .phone-container { width: 375px; height: 750px; background-color: #fff; border-radius: 40px; position: relative; box-shadow: 0 0 0 10px #333, 0 20px 50px rgba(0,0,0,0.5); overflow: hidden; display: flex; flex-direction: column; }
        .circle-top { position: absolute; top: -120px; right: -80px; width: 380px; height: 380px; background-color: #d1ebe5; border-radius: 50%; border: 2px solid #f9e6a2; }
        .circle-bottom { position: absolute; bottom: -150px; left: -100px; width: 400px; height: 400px; background-color: #d1ebe5; border-radius: 50%; border: 2px solid #f9e6a2; }
        .content { position: relative; z-index: 5; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .app-title { font-size: 28px; font-weight: bold; color: #26C6B0; margin-top: 10px; }
        .control-card { width: 85%; background: linear-gradient(180deg, rgba(168, 218, 211, 0.9) 0%, rgba(230, 247, 245, 0.9) 100%); padding: 30px 15px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .switch { position: relative; display: inline-block; width: 80px; height: 38px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #6C7E7B; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 30px; width: 30px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #26C6B0; }
        input:checked + .slider:before { transform: translateX(42px); }
        .home-indicator { height: 5px; width: 120px; background-color: #333; border-radius: 10px; margin: 12px auto; opacity: 0.3; }
    </style>
</head>
<body>
    <div class="phone-container">
        <div class="circle-top"></div><div class="circle-bottom"></div>
        <div class="content">
            <div class="logo-section">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="AmanPlay Logo" style="width: 150px;">
                <div class="app-title">AMAN Play</div>
            </div>
            <div class="control-card">
                <h2 style="margin-bottom:20px;">نظام الحماية</h2>
                <label class="switch">
                    <input type="checkbox" id="mainToggle">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
        <div class="home-indicator"></div>
    </div>
    <script>
        document.getElementById('mainToggle').addEventListener('change', function() {
            if(this.checked) {
                setTimeout(() => { window.location.href = "{{ url_for('detection') }}"; }, 500);
            }
        });
    </script>
</body>
</html>
