<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AmanPlay - Result</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #222; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .phone-container { width: 375px; height: 750px; background-color: #fff; border-radius: 40px; position: relative; box-shadow: 0 0 0 10px #333, 0 20px 50px rgba(0,0,0,0.5); overflow: hidden; display: flex; flex-direction: column; }
        .circle-top { position: absolute; width: 380px; height: 380px; background-color: #d1ebe5; border-radius: 50%; border: 2px solid #f9e6a2; top: -120px; right: -80px; z-index: 1; }
        .content { position: relative; z-index: 5; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        
        .result-card { 
            width: 90%; 
            background: white; 
            padding: 30px 20px; 
            border-radius: 25px; 
            border: 2px solid #26C6B0;
            box-shadow: 0 10px 25px rgba(38, 198, 176, 0.1);
        }
        
        .icon-check { 
            width: 60px; height: 60px; background: #26C6B0; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;
            color: white; font-size: 30px;
        }

        h2 { color: #26C6B0; margin-bottom: 15px; font-size: 22px; }
        
        .result-text { 
            background: #f9f9f9; 
            padding: 15px; 
            border-radius: 15px; 
            color: #444; 
            font-size: 16px; 
            line-height: 1.6;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .back-btn { 
            margin-top: 30px; 
            display: inline-block; 
            padding: 12px 30px; 
            background: #26C6B0; 
            color: white; 
            text-decoration: none; 
            border-radius: 10px; 
            font-weight: bold;
            transition: 0.3s;
        }
        .back-btn:hover { background: #1f9e8d; }
    </style>
</head>
<body>
    <div class="phone-container">
        <div class="circle-top"></div>
        
        <div class="content">
            <div class="result-card">
                <div class="icon-check">✓</div>
                <h2>نتيجة الكشف</h2>
                
                <div class="result-text">
                    {{ result }}
                </div>

                <a href="{{ url_for('detection') }}" class="back-btn">فحص جديد</a>
            </div>
        </div>
    </div>
</body>
</html>
